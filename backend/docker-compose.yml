services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tknt}
      POSTGRES_USER: ${POSTGRES_USER:-tknt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tknt_password}
    ports:
      - "${POSTGRES_PORT_HOST:-5432}:5432"
    volumes:
      - tknt-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-tknt}
      POSTGRES_USER: ${POSTGRES_USER:-tknt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tknt_password}
      TKNT_SHARED_INVENTORY_TENANT_ID: ${TKNT_SHARED_INVENTORY_TENANT_ID:-demo_tenant}
      TKNT_ENABLE_DEMO_INVENTORY: ${TKNT_ENABLE_DEMO_INVENTORY:-1}
      TKNT_DEMO_INVENTORY_ENABLED: ${TKNT_ENABLE_DEMO_INVENTORY:-1}
      TKNT_LOG_LEVEL: ${TKNT_LOG_LEVEL:-INFO}
      TKNT_CORS_ALLOWED_ORIGINS: ${TKNT_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173,https://house-design-protocol.vercel.app}
      TKNT_CORS_ALLOWED_ORIGIN_REGEX: ${TKNT_CORS_ALLOWED_ORIGIN_REGEX:-}
    ports:
      - "${TKNT_API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./cases:/app/cases
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  tknt-postgres-data:
